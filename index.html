<body>
<div id="app"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const CONFIG={
  clientId:"75306184-ba27-4d47-9ecc-44672968e27c",
  tenantId:"2b321c65-8aa1-41cd-a56d-f5eef2552b18",
  siteHost:"boblillypromo.sharepoint.com",
  sitePath:"/sites/BLPE-Commerce",
  redirectUri:window.location.origin+window.location.pathname,
  scopes:["Sites.ReadWrite.All","User.Read"]
};
const SOFT_GOODS=["Apparel","Headwear","Socks","Table Covers","Towels","Bags"];
const CATEGORIES=["Apparel","Drinkware","Bags","Headwear","Writing","Technology","Outdoor/Leisure","Awards/Recognition","Stationery","Health/Safety","Automotive","Food/Beverage","Housewares","Socks","Table Covers","Towels","Signage","Other"];
const DECO_METHODS=["Screen Print","Embroidery","Laser Engrave","Heat Transfer","Pad Print","UV Print","Deboss","Full Color Digital","Sublimation","Etching","Direct to Film DTF","Direct to Garment DTG","None","Other"];

// ============================================================
// STATE
// ============================================================
let msalInstance=null,accessToken=null,userName="",siteId="",projectsListId="",productsListId="";
let appView="login"; // login, dashboard, newproject, projectdetail, form
let projects=[],products=[],currentProject=null,currentProduct=null;
let role="sales",currentStep=0,form={},modified={};
let saving=false;

// ============================================================
// MSAL AUTH
// ============================================================
function initMsal(){
  msalInstance=new msal.PublicClientApplication({
    auth:{clientId:CONFIG.clientId,authority:`https://login.microsoftonline.com/${CONFIG.tenantId}`,redirectUri:CONFIG.redirectUri},
    cache:{cacheLocation:"sessionStorage"}
  });
}
async function login(){
  try{
    const resp=await msalInstance.loginPopup({scopes:CONFIG.scopes});
    userName=resp.account.name||resp.account.username;
    await getToken();
    await initSharePoint();
    appView="dashboard";
    await loadProjects();
    render();
  }catch(e){console.error("Login error:",e);showToast("Login failed. Please try again.","error");}
}
async function getToken(){
  const accounts=msalInstance.getAllAccounts();
  if(!accounts.length)throw new Error("No accounts");
  try{
    const resp=await msalInstance.acquireTokenSilent({scopes:CONFIG.scopes,account:accounts[0]});
    accessToken=resp.accessToken;
  }catch(e){
    const resp=await msalInstance.acquireTokenPopup({scopes:CONFIG.scopes});
    accessToken=resp.accessToken;
  }
}
async function graphGet(url){
  await getToken();
  const r=await fetch(`https://graph.microsoft.com/v1.0${url}`,{headers:{Authorization:`Bearer ${accessToken}`}});
  if(!r.ok)throw new Error(`Graph GET ${r.status}: ${await r.text()}`);
  return r.json();
}
async function graphPost(url,body){
  await getToken();
  const r=await fetch(`https://graph.microsoft.com/v1.0${url}`,{method:"POST",headers:{Authorization:`Bearer ${accessToken}`,"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok)throw new Error(`Graph POST ${r.status}: ${await r.text()}`);
  return r.json();
}
async function graphPatch(url,body){
  await getToken();
  const r=await fetch(`https://graph.microsoft.com/v1.0${url}`,{method:"PATCH",headers:{Authorization:`Bearer ${accessToken}`,"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok)throw new Error(`Graph PATCH ${r.status}: ${await r.text()}`);
  return r.json();
}

// ============================================================
// SHAREPOINT INIT
// ============================================================
async function initSharePoint(){
  const site=await graphGet(`/sites/${CONFIG.siteHost}:${CONFIG.sitePath}`);
  siteId=site.id;
  const lists=await graphGet(`/sites/${siteId}/lists`);
  lists.value.forEach(l=>{
    if(l.displayName==="Projects")projectsListId=l.id;
    if(l.displayName==="Products")productsListId=l.id;
  });
  if(!projectsListId||!productsListId)throw new Error("Could not find Projects or Products lists");
}

// ============================================================
// DATA OPERATIONS
// ============================================================
async function loadProjects(){
  const data=await graphGet(`/sites/${siteId}/lists/${projectsListId}/items?expand=fields&$top=200`);
  projects=data.value.map(i=>({id:i.id,...i.fields}));
}
async function loadProducts(projectId){
  const data=await graphGet(`/sites/${siteId}/lists/${productsListId}/items?expand=fields&$filter=fields/Project_x0020_NameLookupId eq '${projectId}'&$top=500`);
  products=data.value.map(i=>({id:i.id,...i.fields}));
}
async function createProject(fields){
  const item=await graphPost(`/sites/${siteId}/lists/${projectsListId}/items`,{fields});
  await loadProjects();
  return item;
}
async function updateProject(id,fields){
  await graphPatch(`/sites/${siteId}/lists/${projectsListId}/items/${id}/fields`,fields);
}
async function saveProduct(fields,productId){
  if(productId){
    await graphPatch(`/sites/${siteId}/lists/${productsListId}/items/${productId}/fields`,fields);
  }else{
    await graphPost(`/sites/${siteId}/lists/${productsListId}/items`,{fields});
  }
}

// Form to SharePoint field mapping
function formToSPFields(){
  const c=compute();
  const f={
    Title:form.itemName||"Untitled",
    Project_x0020_NameLookupId:currentProject?.id,
    Supplier:form.supplier,
    Product_x0020_Category:form.websiteCategory,
    Vendor_x0020_Item_x0020_Num:form.vendorItemNum,
    Item_x0020_Color:form.itemColor,
    Item_x0020_Size_x0020_Apparel:form.itemSizeApparel,
    Item_x0020_Description:form.itemDescription,
    Stock_x0020_Status:form.stockStatus,
    Is_x0020_Childrens:form.isChildrens,
    Needs_x0020_Prop_x0020_65:form.needsProp65,
    Overseas_x0020_Direct:form.isOverseasDirect,
    Supplier_x0020_Minimum:p(form.supplierMinimum)||null,
    Website_x0020_Minimum:p(form.websiteMinimum)||null,
    First_x0020_Qty_x0020_to_x0020_Order:p(form.firstQtyToOrder)||null,
    Item_x0020_Weight:form.itemWeight,
    Item_x0020_Size_x0020_Dimensional:form.itemSizeDimensional,
    Sell_x0020_in_x0020_Bundles:form.sellInBundles,
    Bundle_x0020_Qty:p(form.bundleQty)||null,
    Decoration_x0020_Supplier:form.decorationSupplier,
    PMS_x0020_Charge:p(form.pmsCharge)||null,
    Item_x0020_Cost_x0020_Net:p(form.itemCostNet)||null,
    Run_x0020_Charge:p(form.runCharge)||null,
    Run_x0020_Charge_x0020_Addl:p(form.runChargeAddlLocation)||null,
    Initial_x0020_Setup_x0020_Charge:p(form.initialSetupCharge)||null,
    Repeat_x0020_Setup:p(form.repeatSetup)||null,
    Folding_x0020_Polybag:p(form.foldingPolybag)||null,
    Shirt_x0020_Size_x0020_Sticker:p(form.shirtSizeSticker)||null,
    Inbound_x0020_Freight_x0020_Method:form.inboundFreightMethod,
    Inbound_x0020_Freight_x0020_Total:p(form.inboundFreightTotal)||null,
    Outbound_x0020_Freight_x0020_Method:form.outboundFreightMethod,
    Outbound_x0020_Freight_x0020_Total:p(form.outboundFreightTotal)||null,
    Ships_x0020_In:form.shipsIn,
    Master_x0020_Carton_x0020_Cost:p(form.masterCartonCost)||null,

function p(v){return parseFloat(v)||0;}
function isSoftGoods(){return SOFT_GOODS.includes(form.websiteCategory);}
function isApparel(){return ["Apparel","Headwear","Socks"].includes(form.websiteCategory);}
function isInStock(){return form.stockStatus==="In Stock";}
function getFreightPct(){return isSoftGoods()?0.01:0.10;}

function setVal(key,val){
  if(role==="admin"&&form[key]!==undefined&&form[key]!==val)modified[key]=true;
  form[key]=val;
  if(key==="websiteCategory"&&isApparel()&&p(form.foldingPolybag)===0)form.foldingPolybag="0.50";
  render();
}

function compute(){
  const baseIc=p(form.itemCostNet);
  const ic=isApparel()&&getEnabledSizes().length>0?getBlendedCost():baseIc;
  const rc=p(form.runCharge),rca=p(form.runChargeAddlLocation),
    rs=p(form.repeatSetup),fq=isApparel()?getTotalSizeQty()||p(form.firstQtyToOrder)||1:p(form.firstQtyToOrder)||1,
    rppc=fq>0?rs/fq:0,
    fp=p(form.foldingPolybag),st=p(form.shirtSizeSticker),
    bf=p(form.bundleFeePerPack),qp=p(form.qtyPerPack)||1,bppc=qp>0?bf/qp:0,
    masterCarton=form.shipsIn==="Master Carton"?p(form.masterCartonCost):0,
    customPkgUnit=form.customPackaging==="Yes"?p(form.customPkgUnitCost):0;
  const tn=ic+rc+rca+rppc+fp+st+bppc+masterCarton+customPkgUnit;
  const baseMf=p(form.marginFloor)||40,
    blpUp=form.programOwnership==="BLP Owned"?(p(form.blpOwnershipUpcharge)||15):0,
    effectiveMf=baseMf+blpUp,md=(100-effectiveMf)/100;
  const freightPct=getFreightPct();
  let ibf=0,obf=0;
  if(isInStock()){
    ibf=form.inboundFreightMethod==="Manual Entry"&&p(form.inboundFreightTotal)>0?(fq>0?p(form.inboundFreightTotal)/fq:0):ic*freightPct;
    obf=form.outboundFreightMethod==="Manual Entry"&&p(form.outboundFreightTotal)>0?(fq>0?p(form.outboundFreightTotal)/fq:0):ic*freightPct;
  }
  const pp=md>0?(tn+ibf+obf)/md:0,
    rf=isInStock()?0.16/qp:0,pf=isInStock()?(pp<=9.99?.15:pp<=24.99?.30:.45)/qp:0,
    cc=pp*.045,spe=pp+rf+pf+cc,spp=spe*qp;
  let su=0;
  if(form.shippingUpchargeType==="Flat $")su=p(form.shippingUpchargeAmount);
  else if(form.shippingUpchargeType==="% of Transaction")su=spe*(p(form.shippingUpchargeAmount)/100);
  const fs=spe+su;
  const setupSellAuto=p(form.initialSetupCharge)/0.8;
  const pmsSellAuto=p(form.pmsCharge)/0.8;
  const marginWarning=effectiveMf<35;
  return{totalNet:tn,programPrice:pp,inboundFreight:ibf,outboundFreight:obf,receivingFee:rf,pickFee:pf,ccFee:cc,
    sellPriceEach:spe,sellPricePack:spp,repeatPerPc:rppc,bundlePerPc:bppc,finalSell:fs,
    marginFloor:baseMf,effectiveMargin:effectiveMf,blpUpcharge:blpUp,shippingUpcharge:su,
    freightPct,setupSellAuto,pmsSellAuto,marginWarning,pmsCharge:p(form.pmsCharge)};
}

  {key:"standardLeadTime",label:"Lead Time"},

];

function scoreFields(fieldList){
  const applicable=fieldList.filter(f=>!f.condition||f.condition());
  const complete=applicable.filter(f=>{
    if(f.check)return f.check();
    const v=form[f.key];
    return v!==undefined&&v!==null&&v!==""&&v!=="0";
  });
  return{total:applicable.length,done:complete.length,pct:applicable.length>0?Math.round(complete.length/applicable.length*100):100,
    missing:applicable.filter(f=>{
      if(f.check)return !f.check();
      const v=form[f.key];return v===undefined||v===null||v===""||v==="0";
    })};
}
function salesScore(){return scoreFields(SALES_REQUIRED);}
function adminScore(){return scoreFields(ADMIN_REQUIRED);}
function programsScore(){return scoreFields(PROGRAMS_REQUIRED);}
function overallScore(){
  const s=salesScore(),a=adminScore(),pr=programsScore();
  const total=s.total+a.total+pr.total,done=s.done+a.done+pr.done;
  return{total,done,pct:total>0?Math.round(done/total*100):100};
}
function compColor(pct){return pct>=100?'green':pct>=75?'yellow':'red';}
function compBar(pct,label){
  const c=compColor(pct);
  return `<div class="comp-row"><span class="comp-label">${label||''}</span><div class="comp-bar"><div class="comp-fill ${c}" style="width:${pct}%"></div></div><span class="comp-pct" style="color:${c==='green'?'#27ae60':c==='yellow'?'#b7950b':'#e74c3c'}">${pct}%</span></div>`;
}
function compBadge(pct){return `<span class="comp-badge ${compColor(pct)}">${pct}%</span>`;}

// Compute completeness from SP fields without loading into form
function computeProductCompleteness(prod){
  // Quick check based on SP fields
  const salesFields=['Supplier','Product_x0020_Category','Vendor_x0020_Item_x0020_Num','Title','Item_x0020_Description','Decoration_x0020_Supplier','Standard_x0020_Lead_x0020_Time'];
  const salesDone=salesFields.filter(f=>prod[f]&&prod[f]!=="0").length;
  const salesHasCost=prod.Item_x0020_Cost_x0020_Net!=null&&prod.Item_x0020_Cost_x0020_Net>0;
  const salesHasDeco=!!prod.Deco_x0020_1_x0020_Method;
  const sDone=salesDone+(salesHasCost?1:0)+(salesHasDeco?1:0);
  const sTotal=salesFields.length+2;
  const sPct=Math.round(sDone/sTotal*100);

  const adminFields=['Item_x0020_Weight'];
  const adminDone=adminFields.filter(f=>prod[f]&&prod[f]!=="0").length;
  const aPct=adminFields.length>0?Math.round(adminDone/adminFields.length*100):100;

  const progFields=['BLP_x0020_Website_x0020_Item_x0020_Num','Standard_x0020_Lead_x0020_Time'];
  const progDone=progFields.filter(f=>prod[f]&&prod[f]!=="0").length;
  const pPct=progFields.length>0?Math.round(progDone/progFields.length*100):100;

  const allDone=sDone+adminDone+progDone,allTotal=sTotal+adminFields.length+progFields.length;
  return{sales:sPct,admin:aPct,programs:pPct,overall:Math.round(allDone/allTotal*100)};
}

const BASE_SIZES=["S","M","L","XL"];
function toggleSize(sz){form.sizes[sz].enabled=!form.sizes[sz].enabled;if(!form.sizes[sz].enabled){form.sizes[sz].qty="";form.sizes[sz].upcharge="0";}render();}
function setSizeField(sz,field,val){form.sizes[sz][field]=val;render();}
function isUpsize(sz){return !BASE_SIZES.includes(sz);}
function getEnabledSizes(){return ALL_SIZES.filter(sz=>form.sizes[sz].enabled);}
function getSizeCost(sz){
  const base=p(form.itemCostNet);
  if(form.singlePriceAllSizes==="Yes")return base;
  return base+p(form.sizes[sz].upcharge);
}
function computeForSize(sz){
  // Run the full pricing engine but with the size-specific item cost
  const ic=getSizeCost(sz),rc=p(form.runCharge),rca=p(form.runChargeAddlLocation),
    rs=p(form.repeatSetup),fq=getTotalSizeQty()||1,rppc=fq>0?rs/fq:0,
    fp=p(form.foldingPolybag),st=p(form.shirtSizeSticker),
    bf=p(form.bundleFeePerPack),qp=p(form.qtyPerPack)||1,bppc=qp>0?bf/qp:0,
    masterCarton=form.shipsIn==="Master Carton"?p(form.masterCartonCost):0,
    customPkgUnit=form.customPackaging==="Yes"?p(form.customPkgUnitCost):0;
  const tn=ic+rc+rca+rppc+fp+st+bppc+masterCarton+customPkgUnit;
  const baseMf=p(form.marginFloor)||40,
    blpUp=form.programOwnership==="BLP Owned"?(p(form.blpOwnershipUpcharge)||15):0,
    effectiveMf=baseMf+blpUp,md=(100-effectiveMf)/100;
  const freightPct=getFreightPct();
  let ibf=0,obf=0;
  if(isInStock()){
    ibf=form.inboundFreightMethod==="Manual Entry"&&p(form.inboundFreightTotal)>0?(fq>0?p(form.inboundFreightTotal)/fq:0):ic*freightPct;
    obf=form.outboundFreightMethod==="Manual Entry"&&p(form.outboundFreightTotal)>0?(fq>0?p(form.outboundFreightTotal)/fq:0):ic*freightPct;
  }
  const pp=md>0?(tn+ibf+obf)/md:0,
    rf=isInStock()?0.16/qp:0,pf=isInStock()?(pp<=9.99?.15:pp<=24.99?.30:.45)/qp:0,
    cc=pp*.045,spe=pp+rf+pf+cc;
  let su=0;
  if(form.shippingUpchargeType==="Flat $")su=p(form.shippingUpchargeAmount);
  else if(form.shippingUpchargeType==="% of Transaction")su=spe*(p(form.shippingUpchargeAmount)/100);
  return{netCost:tn,programPrice:pp,sellEach:spe+su};
}
function getTotalSizeQty(){return getEnabledSizes().reduce((sum,sz)=>sum+p(form.sizes[sz].qty),0);}
function getBlendedCost(){
  const enabled=getEnabledSizes();
  const totalQty=getTotalSizeQty();
  if(totalQty===0)return p(form.itemCostNet);
  return enabled.reduce((sum,sz)=>sum+getSizeCost(sz)*p(form.sizes[sz].qty),0)/totalQty;
}

// AI Description
async function generateDescription(){
  const btn=document.getElementById('aiBtn');if(!btn)return;
  btn.disabled=true;btn.textContent="Generating...";
  try{
    const decoDesc=form.decorations.map(d=>(d.method||'N/A')+' at '+(d.location||'N/A')).join('; ');
    const prompt=`Write a concise, professional e-commerce product description (2-3 sentences) for this promotional product:\nProduct: ${form.itemName}\nCategory: ${form.websiteCategory}\nColor: ${form.itemColor||'N/A'}\nDecoration(s): ${decoDesc}\nWrite in a professional tone for a corporate merchandise website. Return only the description.`;
    const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:200,messages:[{role:"user",content:prompt}]})});
    const data=await resp.json();
    const text=data.content.map(c=>c.text||"").join("").trim();

  finally{if(document.getElementById('aiBtn')){document.getElementById('aiBtn').disabled=false;document.getElementById('aiBtn').textContent="✨ Generate with AI";}}
}

// Save handler
async function handleSave(){
  if(saving)return;saving=true;render();
  try{
    const fields=formToSPFields();
    await saveProduct(fields,currentProduct?.id||null);
    showToast("Saved to SharePoint!");
    await loadProducts(currentProject.id);
    if(!currentProduct?.id){
      // Find the product we just created
      const found=products.find(p=>p.Title===form.itemName);
      if(found)currentProduct=found;
    }
    saving=false;render();
  }catch(e){
    console.error("Save error:",e);
    showToast("Save failed: "+e.message,"error");
    saving=false;render();
  }
}

function mkSel(id,opts,ph){

  opts.forEach(o=>{h+=`<option value="${o}"${v===o?' selected':''}>${o}</option>`;});
  return h+'</select>';
}
function mkIn(id,type,ph,ro){
  const v=form[id]||"";const cls=(modified[id]?"field-modified":"")+(ro?" readonly-field":"");
  return `<input type="${type||'text'}" id="${id}" value="${v}" placeholder="${ph||''}" onchange="setVal('${id}',this.value)" oninput="setVal('${id}',this.value)" class="${cls}" ${ro?'readonly':''}>`;
}
function mkTog(id,opts){
  const v=form[id];
  return '<div class="toggle-group">'+opts.map(o=>`<button type="button" class="toggle-btn ${v===o?'on':'off'}" onclick="setVal('${id}','${o}')">${o}</button>`).join('')+'</div>';
}
function fld(label,content,opts={}){
  if(opts.visible===false)return'';
  const req=opts.required?'<span class="req">*</span>':'';
  const help=opts.help?`<div class="field-help">${opts.help}</div>`:'';
  const mod=modified[opts.key]?'<span class="modified-tag">Modified</span>':'';
  const owner=opts.owner?`<span class="section-owner owner-${opts.owner}">${opts.owner==='sales'?'Sales':opts.owner==='admin'?'Admin':'Programs'}</span>`:'';
  const badge=opts.badge||'';
  return `<div class="field"><label class="field-label">${label}${req}${badge}${mod}${owner}</label>${content}${help}</div>`;
}
function crd(title,subtitle,content,ownerTag){
  const t=title?`<div class="card-title">${title}${ownerTag?'<span class="section-owner owner-'+ownerTag+'">'+(ownerTag==='sales'?'Sales Rep':ownerTag==='admin'?'E-Com Admin':'Programs')+'</span>':''}</div>`:'';
  const s=subtitle?`<div class="card-sub">${subtitle}</div>`:'';
  return `<div class="card">${t}${s}${content}</div>`;
}
function rr(l,v){if(!v||v==="0"||v==="N/A"||v==="$0.00"||v==="$0"||v==="0.00")return'';return `<div class="review-row"><span class="review-label">${l}</span><span class="review-value">${v}</span></div>`;}

        ${fld("Vendor Item #",mkIn("vendorItemNum","text","e.g., PC55"),{required:true})}
        ${fld("Item Name",mkIn("itemName","text","e.g., Realtree 10oz Tumbler"),{required:true})}
      </div>
      <div class="row row-2">
        ${fld("Item Color",mkIn("itemColor","text",""))}
        ${fld("Apparel Size Range",mkIn("itemSizeApparel","text","e.g., XS-XL"),{visible:isApparel()})}
      </div>
      ${fld("Item Description",'<textarea id="itemDescription" rows="3" placeholder="Product description..." onchange="setVal(\'itemDescription\',this.value)" oninput="setVal(\'itemDescription\',this.value)">'+(form.itemDescription||'')+'</textarea><button class="btn-ai" id="aiBtn" onclick="generateDescription()">✨ Generate with AI</button>',{badge:'<span class="ai-badge">AI</span>'})}`
    ,"sales")+crd("Compliance","",
      `<div class="row row-2">
        ${fld("Stock Status",mkTog("stockStatus",["In Stock","On Demand"]))}
        ${fld("Overseas Direct",mkTog("isOverseasDirect",["Yes","No"]))}
      </div>
      <div class="row row-2">
        ${fld("Children's Product",mkTog("isChildrens",["Yes","No"]))}
        ${fld("PROP 65",mkTog("needsProp65",["Yes","No"]))}
      </div>`
    )+crd("Quantities","",
      `<div class="row row-3">
        ${fld("Supplier Min",mkIn("supplierMinimum","number",""))}
        ${fld("Website Min",mkIn("websiteMinimum","number","1"))}
        ${isApparel()?'':''+fld("1st Qty to Order",mkIn("firstQtyToOrder","number",""))}
      </div>
      <div class="row row-2">
        ${fld("Item Weight",role==="sales"?mkIn("itemWeight","text","Admin completes",true):mkIn("itemWeight","text",""),role==="sales"?{owner:"admin"}:{})}
        ${fld("Dimensions",role==="sales"?mkIn("itemSizeDimensional","text","Admin completes",true):mkIn("itemSizeDimensional","text",""),Object.assign({visible:!isApparel()},role==="sales"?{owner:"admin"}:{}))}
      </div>
      <div class="row row-2">
        ${fld("Sell in Bundles?",mkTog("sellInBundles",["Yes","No"]))}
        ${fld("Qty Per Bundle",mkIn("bundleQty","number",""),{visible:form.sellInBundles==="Yes"})}
      </div>`
    )+(isApparel()?crd("Apparel Size Grid","Select available sizes, enter upcharges for upsizes, and qty per size for 1st order.",
      `<div class="single-price-toggle">
        <input type="checkbox" id="singlePriceToggle" ${form.singlePriceAllSizes==="Yes"?'checked':''} onchange="setVal('singlePriceAllSizes',this.checked?'Yes':'No')">
        <label for="singlePriceToggle" style="cursor:pointer">Single price for all sizes (no upsize upcharges)</label>
      </div>
      <table class="size-grid">
        <tr><th></th><th>Size</th><th>Base Cost</th>${form.singlePriceAllSizes==="No"?'<th>Upcharge</th><th>Net Cost</th>':'<th>Net Cost</th>'}<th>1st Order Qty</th><th>Sell Each</th></tr>
        ${ALL_SIZES.map(sz=>{
          const s=form.sizes[sz],enabled=s.enabled,isUp=isUpsize(sz);
          const cost=getSizeCost(sz);
          const sell=enabled&&p(form.itemCostNet)>0?computeForSize(sz).sellEach:0;
          return `<tr class="${isUp&&enabled?'upsize':''}">
            <td><input type="checkbox" ${enabled?'checked':''} onchange="toggleSize('${sz}')"></td>
            <td class="size-label">${sz}</td>
            <td class="cost-val">${enabled?'$'+p(form.itemCostNet).toFixed(2):'-'}</td>
            ${form.singlePriceAllSizes==="No"?`<td>${enabled&&isUp?'<input type="number" value="'+(s.upcharge||'')+'" placeholder="0" onchange="setSizeField(\''+sz+'\',\'upcharge\',this.value)" oninput="setSizeField(\''+sz+'\',\'upcharge\',this.value)" step="0.01">':enabled?'—':'-'}</td>
            <td class="cost-val">${enabled?'$'+cost.toFixed(2):'-'}</td>`:`<td class="cost-val">${enabled?'$'+cost.toFixed(2):'-'}</td>`}
            <td>${enabled?'<input type="number" value="'+(s.qty||'')+'" placeholder="0" onchange="setSizeField(\''+sz+'\',\'qty\',this.value)" oninput="setSizeField(\''+sz+'\',\'qty\',this.value)" min="0">':'-'}</td>
            <td class="sell-val">${enabled&&sell>0?'$'+sell.toFixed(2):'-'}</td>
          </tr>`;
        }).join('')}
      </table>
      <div class="size-totals">
        <div class="size-totals-item">Total Units: <strong>${getTotalSizeQty()}</strong></div>
        <div class="size-totals-item">Blended Cost: <strong>$${getBlendedCost().toFixed(2)}</strong></div>
        <div class="size-totals-item">Sizes: <strong>${getEnabledSizes().join(', ')}</strong></div>
      </div>`):'');
  }

  else if(stepId==="decoration"){
    let decHtml='';
    form.decorations.forEach((dec,i)=>{
      decHtml+=`<div class="kit-item">
        ${form.decorations.length>1?`<button class="kit-item-remove" onclick="removeDecoration(${i})">×</button>`:''}
        <div style="font-size:11px;font-weight:700;color:#1a5276;margin-bottom:6px">Decoration ${i+1}</div>
        <div class="row row-2">
          <div class="field"><label class="field-label">Method${i===0?'<span class="req">*</span>':''}</label>
            <select id="_dec${i}m" onchange="setDeco(${i},'method',this.value)"><option value="">Select...</option>${DECO_METHODS.map(m=>'<option value="'+m+'"'+(dec.method===m?' selected':'')+'>'+m+'</option>').join('')}</select></div>
          <div class="field"><label class="field-label">Location</label><input type="text" value="${dec.location}" onchange="setDeco(${i},'location',this.value)" placeholder="e.g., Full Front"></div>
        </div>
        <div class="row row-3">
          <div class="field"><label class="field-label">Dimensions</label><input type="text" value="${dec.dimensions}" onchange="setDeco(${i},'dimensions',this.value)"></div>
          <div class="field"><label class="field-label">Logo</label><input type="text" value="${dec.logo}" onchange="setDeco(${i},'logo',this.value)"></div>
          <div class="field"><label class="field-label"># Colors</label><input type="number" value="${dec.colors}" onchange="setDeco(${i},'colors',this.value)"></div>
        </div>
        <div class="row row-2">
          <div class="field"><label class="field-label">PMS Colors</label><input type="text" value="${dec.pms}" onchange="setDeco(${i},'pms',this.value)"></div>
          <div class="field"><label class="field-label">Setup Cost (net)</label><input type="number" value="${dec.setupCost||''}" onchange="setDeco(${i},'setupCost',this.value)" placeholder="0"></div>
        </div>
      </div>`;
    });
    html+=crd("Decoration Supplier","",fld("Supplier",mkIn("decorationSupplier","text","e.g., Promos Ink")),"sales")
      +crd("Decorations","Up to 4 decoration locations.",
        `${decHtml}${form.decorations.length<4?'<button class="btn-add-item" onclick="addDecoration()">+ Add Decoration</button>':''}`);
  }

  else if(stepId==="costs"){
    const c=compute();
    html+=crd("Item & Decoration Costs","All costs NET.",
      `<div class="row row-3">
        ${fld("Item Cost (net)",mkIn("itemCostNet","number",""),{required:true})}
        ${fld("Run Charge",mkIn("runCharge","number","0"))}
        ${fld("Run Charge Addl",mkIn("runChargeAddlLocation","number","0"))}
      </div>
      <div class="row row-3">
        ${fld("Initial Setup (net)",mkIn("initialSetupCharge","number","0"))}
        ${fld("Repeat Setup (net)",mkIn("repeatSetup","number","0"),{help:"Amortized over 1st qty."})}
        ${fld("PMS Charge (net)",mkIn("pmsCharge","number","0"),{help:"Billed separately."})}
      </div>
      ${isApparel()?`<div class="row row-2">
        ${fld("Folding & Polybag (net/unit)",mkIn("foldingPolybag","number","0.50"),{help:"Default $0.50 for apparel."})}
        ${fld("Shirt Size Sticker",mkIn("shirtSizeSticker","number","0"))}
      </div>`:''}`
    ,"sales")+crd("Setup Sell Prices","Auto: cost ÷ 0.8 (20% margin). Override if needed.",
      `${form.decorations.map((dec,i)=>
        '<div class="row row-2"><div class="field"><label class="field-label">Deco '+(i+1)+' Setup Sell'+(dec.method?' — '+dec.method:'')+'</label><input type="number" value="'+(dec.setupSell||'')+'" onchange="setDeco('+i+',\'setupSell\',this.value)" placeholder="'+(p(dec.setupCost||form.initialSetupCharge)/0.8).toFixed(2)+'"><div class="field-help">Auto: $'+(p(dec.setupCost||form.initialSetupCharge)/0.8).toFixed(2)+'</div></div><div></div></div>'
      ).join('')}
      ${fld("PMS Match (sell)",mkIn("pmsSell","number",""),{help:p(form.pmsCharge)>0?"Auto: $"+(p(form.pmsCharge)/0.8).toFixed(2):""})}`
    )+(role!=="sales"?crd("Pricing Preview",`Margin: ${compute().effectiveMargin}%`,
      `<div class="pricing-box"><div class="row row-3">
        <div><div class="pricing-label">Net</div><div class="pricing-value">$${c.totalNet.toFixed(2)}</div></div>
        <div><div class="pricing-label">Program</div><div class="pricing-value blue">$${c.programPrice.toFixed(2)}</div></div>
        <div><div class="pricing-label">Sell</div><div class="pricing-value green">$${c.finalSell.toFixed(2)}</div></div>
      </div></div>`):'');
  }

  else if(stepId==="freight"){
    const c=compute();
    html+=crd("Freight"+(isSoftGoods()?" — Soft Goods":"— Hard Goods"),
      `Default: ${isSoftGoods()?"1%":"10%"} of item cost.`,
      `${fld("Item Weight",mkIn("itemWeight","text","e.g., 0.5 lb"),{owner:"admin"})}
      ${fld("Dimensions",mkIn("itemSizeDimensional","text","e.g., 3.5x8.5"),{owner:"admin",visible:!isApparel()})}
      <div class="row row-2">
        ${fld("Inbound Method",mkTog("inboundFreightMethod",["Category Default","Manual Entry"]))}
        ${form.inboundFreightMethod==="Manual Entry"?fld("Inbound Total $",mkIn("inboundFreightTotal","number","")):''}
      </div>
      <div class="inbound-box"><div class="inbound-label">Inbound/pc: $${c.inboundFreight.toFixed(4)}</div></div>
      <div class="row row-2" style="margin-top:12px">
        ${fld("Outbound Method",mkTog("outboundFreightMethod",["Category Default","Manual Entry"]))}
        ${form.outboundFreightMethod==="Manual Entry"?fld("Outbound Total $",mkIn("outboundFreightTotal","number","")):''}
      </div>
      <div class="inbound-box"><div class="inbound-label">Outbound/pc: $${c.outboundFreight.toFixed(4)}</div></div>`
    ,"admin")+crd("Pricing with Freight","",
      `<div class="pricing-box"><div class="row row-3">
        <div><div class="pricing-label">Net</div><div class="pricing-value">$${c.totalNet.toFixed(2)}</div></div>
        <div><div class="pricing-label">Program</div><div class="pricing-value blue">$${c.programPrice.toFixed(2)}</div></div>
        <div><div class="pricing-label">Sell</div><div class="pricing-value green">$${c.finalSell.toFixed(2)}</div></div>
      </div></div>`);
  }

  else if(stepId==="packaging"){
    html+=crd("Packaging & Bundling","",
      `<div class="row row-2">
        ${fld("Sold As",mkTog("soldAs",["Each","Pack"]))}
        ${fld("Qty Per Pack",mkIn("qtyPerPack","number","1"),{visible:form.soldAs==="Pack"})}
      </div>
      ${form.soldAs==="Pack"?`<div class="row row-2">
        ${fld("Bundle Source",mkSel("bundleSource",["Manufacturer pack","BLP pack","N/A"]))}
        ${fld("Bundle Fee/Pack (net)",mkIn("bundleFeePerPack","number","0"))}
      </div>`:''}`
    )+crd("Outbound Shipping","",
      `${fld("Ships In",mkTog("shipsIn",["Shipping Envelope","Master Carton","Individual Box"]))}
      ${form.shipsIn==="Master Carton"?`
        <div class="inbound-box"><div class="inbound-label">Adds $${p(form.masterCartonCost).toFixed(2)}/unit to cost.</div></div>
        ${fld("Carton Cost (net/unit)",mkIn("masterCartonCost","number","1.00"))}
      `:''}
      ${fld("Custom Branded Packaging?",mkTog("customPackaging",["Yes","No"]),{help:"Logo on packaging or branded tape."})}
      ${form.customPackaging==="Yes"?`
        ${fld("Type",mkTog("customPackagingType",["Custom Envelope","Custom Carton","Branded Tape","Custom Carton + Tape"]))}
        <div class="row row-2">
          ${fld("Setup Cost",mkIn("customPkgSetupCost","number","0"))}
          ${fld("Unit Cost",mkIn("customPkgUnitCost","number","0"))}
        </div>`:''}`);
  }

  else if(stepId==="logistics"){
    html+=crd("Logistics & Notes","",
      `<div class="row row-2">
        ${fld("Lead Time",mkIn("standardLeadTime","text","e.g., 10"),{help:"Business days from order/art approval."})}
        ${fld("24-Hour Production",mkTog("is24HrAvailable",["Yes","No"]))}
      </div>
      <div class="row row-2">
        ${fld("Low Par Level",mkIn("lowParLevel","number",""))}
        ${fld("Co-op #",mkIn("coopNum","text",""))}
      </div>
      ${fld("Product URL",mkIn("productURL","text","https://..."))}
      ${fld("Notes",'<textarea id="notes" rows="3" onchange="setVal(\'notes\',this.value)" oninput="setVal(\'notes\',this.value)">'+(form.notes||'')+'</textarea>')}`);
  }

  else if(stepId==="programfields"){
    const c=compute();
    html+=crd("Program-Assigned Fields","",
      `<div class="row row-2">
        ${fld("BLP Website Item #",mkIn("blpWebsiteItemNum","text",""),{owner:"programs"})}
        ${fld("Co-op #",mkIn("coopNum","text",""),{owner:"programs"})}
      </div>
      ${fld("Website Description",'<textarea id="websiteDescription" rows="3" onchange="setVal(\'websiteDescription\',this.value)">'+(form.websiteDescription||'')+'</textarea>',{owner:"programs"})}
      ${form.itemDescription?'<div class="inbound-box"><div class="inbound-label">Sales Draft:</div><div style="font-size:11px;margin-top:3px">'+form.itemDescription+'</div></div>':''}`
    ,"programs")+crd("Pricing","",
      `<div class="row row-3">
        ${fld("Website Price",mkIn("currentWebsitePrice","number",c.finalSell.toFixed(2)),{owner:"programs"})}
        ${fld("SB Eaches",mkIn("sbPriceEaches","number",c.sellPriceEach.toFixed(2)),{owner:"programs"})}
        ${fld("SB Packs",mkIn("sbPricePacks","number",c.sellPricePack.toFixed(2)),{owner:"programs"})}
      </div>
      ${fld("Final Sell SB",mkIn("finalSellSB","number",c.finalSell.toFixed(2)),{owner:"programs"})}
      <div class="row row-2">
        ${fld("OMG Sell",mkIn("omgSell","number","0"),{owner:"programs"})}
        ${fld("OMG Cost",mkIn("omgCost","number","0"),{owner:"programs"})}
      </div>`
    ,"programs");
  }

  else if(stepId==="validation"){
    const c=compute();
    const checks=[];
    const chk=(ok,l)=>checks.push({ok,label:l});
    chk(!!form.supplier,"Supplier");chk(!!form.websiteCategory,"Category");
    chk(!!form.itemName,"Item name");chk(!!form.vendorItemNum,"Vendor item #");
    chk(form.decorations.length>0&&!!form.decorations[0].method,"Decoration method");
    chk(p(form.itemCostNet)>0,"Item cost");chk(c.effectiveMargin>=35,"Margin ≥ 35% ("+c.effectiveMargin+"%)");
    chk(c.finalSell>0,"Sell > $0");chk(c.finalSell>=c.totalNet,"Sell ≥ net cost");
    chk(!isInStock()||(c.inboundFreight>0||c.outboundFreight>0),"Freight (in-stock)");
    chk(!!form.itemWeight||!isInStock(),"Item weight");
    const ok=checks.every(c=>c.ok);
    html+=`<div class="${ok?'validation-card validation-ok':'validation-card'}">
      <div class="validation-title">${ok?'✅ All Checks Passed':'⚠️ Issues'}</div>
      ${checks.map(c=>`<div class="validation-item">${c.ok?'<span style="color:#27ae60">✓</span>':'<span style="color:#e74c3c">✗</span>'} ${c.label}</div>`).join('')}
    </div>`;
  }

  else if(stepId==="review"){
    const c=compute();
    html+=crd("Summary","",
      rr("Ownership",form.programOwnership)+rr("Margin",c.effectiveMargin+"%")+rr("Supplier",form.supplier)+rr("Category",form.websiteCategory)
      +rr("Item",form.itemName+" ("+form.vendorItemNum+")")+rr("Color",form.itemColor)+rr("Stock",form.stockStatus)
      +(isApparel()?rr("Sizes",getEnabledSizes().join(", "))+rr("Total Units",String(getTotalSizeQty()))+rr("Blended Cost","$"+getBlendedCost().toFixed(2))+(form.singlePriceAllSizes==="Yes"?rr("Pricing","Single price all sizes"):""):"")
      +form.decorations.map((d,i)=>rr("Deco "+(i+1),(d.method||"")+" @ "+(d.location||""))).join("")
    )+crd("Pricing","",`<div class="review-summary"><div class="row row-3">
      <div><div class="pricing-label">Net</div><div class="pricing-value">$${c.totalNet.toFixed(2)}</div></div>
      <div><div class="pricing-label">Program</div><div class="pricing-value blue">$${c.programPrice.toFixed(2)}</div></div>
      <div><div class="pricing-label">Sell</div><div class="pricing-value green">$${c.finalSell.toFixed(2)}</div></div>
    </div></div>`+rr("Item Cost","$"+p(form.itemCostNet).toFixed(2))+rr("Inbound","$"+c.inboundFreight.toFixed(4))+rr("Outbound","$"+c.outboundFreight.toFixed(4))
      +rr("Ships In",form.shipsIn)+(c.marginWarning?'<div class="margin-warning"><span class="margin-warning-icon">⚠️</span><span class="margin-warning-text">Margin below 35%!</span></div>':''));
  }

  // Navigation + Save + Completeness
  const ss=salesScore(),as=adminScore(),ps=programsScore();
  const canSubmit=ss.pct===100;
  const isLastStep=currentStep===steps.length-1;

  html+=`<div style="margin-top:14px">`;

  // Show completeness bar on every step
  html+=`<div class="card" style="padding:12px 16px">
    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
      <span style="font-size:11px;font-weight:700;color:#1a5276">Completion:</span>
      ${compBar(ss.pct,'Sales')}
      ${role!=='sales'?compBar(as.pct,'Admin'):''}
      ${role==='programs'?compBar(ps.pct,'Pgm'):''}
    </div>
  </div>`;

  // On review step, show submission gate
  if(isLastStep){
    if(canSubmit){
      html+=`<div class="submit-gate submit-gate-ready">
        <div style="font-size:13px;font-weight:700;color:#27ae60;margin-bottom:6px">✅ Ready to Submit</div>
        <div style="font-size:11px;color:#7f8c8d">All required sales fields are complete. This product can be submitted for admin review.</div>
      </div>`;
    }else{
      html+=`<div class="submit-gate submit-gate-blocked">
        <div style="font-size:13px;font-weight:700;color:#e74c3c;margin-bottom:6px">⚠ Missing Required Fields (${ss.missing.length})</div>
        <div style="font-size:11px;color:#7f8c8d;margin-bottom:6px">Complete these fields before submitting for admin review:</div>
        ${ss.missing.map(f=>`<div class="missing-field">✗ ${f.label}</div>`).join('')}
      </div>`;
    }
  }

  html+=`<div class="nav-row">
    <button class="btn-back" onclick="prev()" ${currentStep===0?'disabled':''}>← Back</button>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-save ${saving?'saving':''}" onclick="handleSave()" ${saving?'disabled':''}>${saving?'Saving...':'💾 Save Draft'}</button>
      ${isLastStep&&role==='sales'?`<button class="btn-save" onclick="handleSubmitForReview()" style="background:${canSubmit?'#27ae60':'#bdc3c7'};${canSubmit?'':'cursor:not-allowed;opacity:.6'}" ${canSubmit?'':'disabled'}>Submit for Review</button>`:''}
      ${isLastStep&&role==='admin'?`<button class="btn-save" onclick="handleAdminComplete()" style="background:#8e44ad">Mark Admin Complete</button>`:''}
      ${isLastStep&&role==='programs'?`<button class="btn-save" onclick="handleProgramsComplete()" style="background:#1e8449">Mark Complete</button>`:''}
      ${currentStep<steps.length-1?'<button class="btn-next" onclick="next()">Next →</button>':''}
      ${isLastStep?'<button class="btn-save" onclick="handleSaveAndNew()" style="background:#1a5276">Save & Add Another</button>':''}
    </div>
  </div></div>`;

  html+=`</div>`; // close .main
  app.innerHTML=html;
}

// ============================================================
// INIT
// ============================================================
initMsal();
// Check if already logged in
const accounts=msalInstance.getAllAccounts();
if(accounts.length){
  userName=accounts[0].name||accounts[0].username;
  (async()=>{
    try{
      await getToken();await initSharePoint();
      appView="dashboard";await loadProjects();render();
    }catch(e){console.error(e);render();}
  })();
}else{render();}
</script>
</body>
</html>
